# Cloudflare Pages project configuration.
# Bindings here are picked up by Pages Functions in /functions
# and by `wrangler pages dev` for local development.

name = "cbr-labs"
compatibility_date = "2025-05-01"
pages_build_output_dir = "out"

# ---------------------------------------------------------------------------
# D1 database (SQLite at the edge) — single source of truth for admin data.
# Create with:
#   wrangler d1 create cbr-labs-db
# Then paste the database_id printed by the command into the line below.
# ---------------------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "cbr_labs_admin"
database_id = "64879fa2-62a0-4125-9cec-908bea313b37"

# ---------------------------------------------------------------------------
# R2 bucket — receipts, device photos, certs, COI/CAGE docs, audit-packet zips.
# Create with:
#   wrangler r2 bucket create cbr-labs-files
# ---------------------------------------------------------------------------
[[r2_buckets]]
binding = "FILES"
bucket_name = "cbr-labs-files"

# ---------------------------------------------------------------------------
# Environment variables — non-secret. For secrets (HMAC keys, etc.) use
# `wrangler pages secret put NAME` or the Cloudflare dashboard.
# ---------------------------------------------------------------------------
[vars]
COMPANY_NAME      = "CBR Labs LLC"
COMPANY_EMAIL     = "rob@cbr-labs.com"
COMPANY_PHONE     = "+1-703-623-8835"
COMPANY_CAGE      = "14Y35"
COMPANY_UEI       = "K4MZG4KC1MY9"
COMPANY_ADDRESS_1 = "5927 Tilbury Road"
COMPANY_ADDRESS_2 = "Alexandria, VA 22310"
INVOICE_PREFIX    = "CBR"
TAG_YEAR_PREFIX   = "CBR"
